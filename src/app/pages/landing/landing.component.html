<div class="landing" [class.animate-in]="animateIn()" id="main-content" tabindex="-1">

    <!-- Left — Engineer -->
    <button class="panel engineer-panel" [class.expanded]="hoveredSide() === 'engineer'"
        [class.dimmed]="hoveredSide() === 'photography'" (mouseenter)="hoveredSide.set('engineer')"
        (mouseleave)="hoveredSide.set(null)" (click)="navigate('engineer')"
        aria-label="Enter Engineering portfolio">

        <div class="panel-bg engineer-bg"></div>

        <div class="panel-footer">
            <span class="role-label">
                <span class="role-dot"></span>
                Engineer
            </span>
            <span class="enter-hint">Enter &nbsp;<i class="fas fa-arrow-right"></i></span>
        </div>
    </button>

    <!-- Center Name — fixed -->
    <div class="center-name" aria-hidden="true">
        <span class="name-first">Rajeev</span>
        <span class="name-last">Patil</span>
    </div>

    <!-- Vertical split line -->
    <div class="center-divider" aria-hidden="true"></div>

    <!-- Right — Photography -->
    <button class="panel photography-panel" [class.expanded]="hoveredSide() === 'photography'"
        [class.dimmed]="hoveredSide() === 'engineer'" (mouseenter)="hoveredSide.set('photography')"
        (mouseleave)="hoveredSide.set(null)" (click)="navigate('photography')"
        aria-label="Enter Photography portfolio">

        <div class="panel-bg photography-bg"></div>

        <div class="panel-footer">
            <span class="role-label">
                <span class="role-dot"></span>
                Photography
            </span>
            <span class="enter-hint">Enter &nbsp;<i class="fas fa-arrow-right"></i></span>
        </div>
    </button>

</div>
